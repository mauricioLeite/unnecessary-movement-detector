# Stages of the Unnecessary Movement Detector pipeline. Make runs these and
# passes the input video, output directory, and detection flags through the
# environment; .env holds the values used when you run compose yourself.
#
#   docker compose run --rm count

name: movement-detector

# Stages that read the input video.
x-analysis: &analysis
  build: .
  image: movement-detector
  volumes:
    - "${VIDEO_PATH}:/data/${VIDEO_NAME}:ro"
    - "${OUT_DIR}:/out"

# Stages that only touch the results.
x-results: &results
  build: .
  image: movement-detector
  volumes:
    - "${OUT_DIR}:/out"

services:
  # Count repetitions and plot the signal, skipping the annotated video.
  count:
    <<: *analysis
    command: >
      /data/${VIDEO_NAME}
      --plot /out/${STEM}_signal.png
      --no-video
      ${FLAGS}

  # Count, plot, and render the annotated video as an mp4v intermediate.
  render:
    <<: *analysis
    command: >
      /data/${VIDEO_NAME}
      --out /out/${STEM}_raw.mp4
      --plot /out/${STEM}_signal.png
      ${FLAGS}

  # Convert the intermediate to H.264 so it plays anywhere.
  transcode:
    <<: *results
    entrypoint: ffmpeg
    command: >
      -y -i /out/${STEM}_raw.mp4
      -c:v libx264 -crf 18 -preset slow -pix_fmt yuv420p -movflags +faststart
      /out/${STEM}_annotated.mp4

  # The stages above write as root; hand the results back to the host user.
  fix-perms:
    <<: *results
    entrypoint: chown
    command: -R ${HOST_UID}:${HOST_GID} /out

  test:
    build: .
    image: movement-detector
    entrypoint: python
    command: -m unittest discover -s tests
    working_dir: /app
    volumes:
      - ".:/app:ro"
